<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta property="og:title" content="API Note - TKhanh" />
  <meta property="og:description" content="Minimal & elegant API for your notes" />
  <meta property="og:image" content="https://i.imgur.com/LgH7rtS.png" />
  <meta property="og:url" content="https://tkdev.com" />
  <meta property="og:site_name" content="TKhanh" />
  <meta property="og:type" content="website" />
  <link href="https://i.imgur.com/LgH7rtS.png" rel="icon" type="image/x-icon" />
  <title>API Note - TKhanh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes softGlow {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }
    
    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: translateY(18px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes gentlePulse {
      0%, 100% {
        opacity: 0.6;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.02);
      }
    }
    
    .animate-soft-glow {
      background-size: 200% 200%;
      animation: softGlow 12s ease infinite;
    }
    
    .animate-float-in {
      animation: floatIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }
    
    .animate-gentle-pulse {
      animation: gentlePulse 2.2s infinite ease-in-out;
    }
    
    .card-hover {
      transition: all 0.25s ease-out;
    }
    
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.05);
    }
    
    .btn-custom {
      transition: all 0.2s ease;
      backdrop-filter: blur(2px);
    }
    
    .btn-custom:active {
      transform: scale(0.96);
    }
    
    @media (max-width: 480px) {
      .container-padding {
        padding-left: 1.25rem;
        padding-right: 1.25rem;
      }
    }
  </style>
</head>
<body class="m-0 p-0 min-h-screen flex items-center justify-center font-sans antialiased relative overflow-x-hidden">
  <div class="fixed inset-0 -z-10 animate-soft-glow bg-gradient-to-br from-indigo-100 via-sky-100 to-emerald-100"></div>
  <div class="absolute inset-0 -z-5 opacity-20 pointer-events-none bg-[radial-gradient(#cbd5e1_1px,transparent_1px)] [background-size:20px_20px]"></div>

  <div class="container-padding w-full max-w-md px-5 sm:px-6 md:max-w-lg transition-all duration-300">
    <div class="animate-float-in backdrop-blur-sm bg-white/80 rounded-2xl shadow-xl border border-white/40 overflow-hidden card-hover transition-all duration-300">
      <div class="h-1 w-full bg-gradient-to-r from-sky-400 via-indigo-400 to-emerald-400"></div>
      
      <div class="p-6 sm:p-8 text-center">
        <div class="flex justify-center mb-5">
          <div class="relative inline-block group">
            <img src="https://i.imgur.com/LgH7rtS.png" alt="Logo API Note" class="w-24 h-24 sm:w-28 sm:h-28 object-contain drop-shadow-md transition-transform duration-300 group-hover:scale-105">
            <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-8 h-0.5 bg-gradient-to-r from-transparent via-sky-400 to-transparent rounded-full opacity-0 group-hover:opacity-70 transition-opacity"></div>
          </div>
        </div>
        
        <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent mb-2">
          API Note
        </h1>
        <div class="flex justify-center gap-1 mb-6">
          <span class="inline-block w-6 h-0.5 rounded-full bg-sky-300"></span>
          <span class="inline-block w-3 h-0.5 rounded-full bg-indigo-300"></span>
          <span class="inline-block w-6 h-0.5 rounded-full bg-emerald-300"></span>
        </div>
        <p class="text-gray-500 text-sm sm:text-base max-w-xs mx-auto mb-8 font-light">
            API Note Editor tiện lợi cho các developer muốn sử dụng để lưu trữ code
        </p>
        
        <div class="bg-white/70 backdrop-blur-sm rounded-xl p-4 sm:p-5 border border-sky-100/80 shadow-inner transition-all duration-200 hover:border-sky-200">
          <a href="/:UUID" class="block group">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 flex-wrap">
              <div class="flex items-center gap-2 w-full sm:w-auto justify-center sm:justify-start">
                <div class="bg-gray-100/80 rounded-full px-4 py-2 inline-flex items-center gap-2 border border-gray-200/60 shadow-sm transition-all duration-200 group-hover:bg-sky-50 group-hover:border-sky-300">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-sky-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.102m1.102-1.102a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.102 1.102" />
                  </svg>
                  <code class="text-sm font-mono text-gray-700 tracking-wide">/</code>
                  <code class="text-sm font-mono font-semibold text-sky-700 bg-sky-50 px-1.5 py-0.5 rounded-md group-hover:bg-sky-100 transition">:UUID</code>
                </div>
              </div>
              <div class="btn-custom group relative inline-flex items-center justify-center gap-2 bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-600 hover:to-indigo-600 text-white font-medium px-6 py-2.5 rounded-full shadow-md transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-sky-300 focus:ring-offset-2 active:scale-95 w-full sm:w-auto">
                <span class="text-sm tracking-wide">New Note</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform duration-200 group-hover:translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
              </div>
            </div>
          </a>
        </div>
        
        <div class="mt-6 flex justify-center gap-3 text-gray-400 text-xs">
          <div class="flex items-center gap-1">
            <div class="w-1.5 h-1.5 rounded-full bg-sky-400 animate-gentle-pulse"></div>
            <span>API sẵn sàng</span>
          </div>
          <div class="flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>Hoạt động 24/7</span>
          </div>
        </div>
      </div>
      <div class="px-6 py-3 bg-white/30 border-t border-white/40 text-center text-[11px] text-gray-400/80">
        ✦ Miễn phí – Truy cập nhanh ✦
      </div>
    </div>
    
    <div class="text-center text-gray-500/60 text-[11px] mt-5 animate-float-in" style="animation-delay: 0.1s; animation-fill-mode: backwards;">
    </div>
  </div>
</body>
</html>
